<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>TrashAI — Recycling Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="stage">
    <main class="phone" aria-label="Recycling guide preview">
      <!-- Status bar -->
      <header class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons" aria-hidden="true">
          <svg class="icon-signal" width="17" height="11" viewBox="0 0 17 11"><path fill="currentColor" d="M1 7h2v3H1V7zm4-2h2v5H5V5zm4-2h2v7H9V3zm4-2h2v9h-2V1z"/></svg>
          <svg class="icon-wifi" width="15" height="11" viewBox="0 0 15 11"><path fill="currentColor" d="M7.5 2.5c2.5 0 4.8 1 6.5 2.6l-1 1.2A8.1 8.1 0 007.5 4.5 8.1 8.1 0 002 6.3L1 5.1A9.5 9.5 0 017.5 2.5zm0 3c1.7 0 3.3.7 4.4 1.8l-1 1.1c-.9-.8-2.1-1.3-3.4-1.3s-2.5.5-3.4 1.3l-1-1.1c1.1-1.1 2.7-1.8 4.4-1.8zm0 3c.9 0 1.7.4 2.3 1l-2.3 2.6L5.2 9.5c.6-.6 1.4-1 2.3-1z"/></svg>
          <svg class="icon-battery" width="25" height="12" viewBox="0 0 27 13"><rect x="1" y="3" width="21" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.2"/><path fill="currentColor" d="M24 5v5c.8 0 1.5-.7 1.5-1.5v-2C25.5 5.7 24.8 5 24 5z"/><rect x="3" y="5" width="16" height="4" rx="1" fill="currentColor"/></svg>
        </div>
      </header>

      <!-- Location pill -->
      <div class="location-row">
        <div class="location-pill glass-pill">
          <svg class="icon-pin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-4.5 7-11a7 7 0 10-14 0c0 6.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5" fill="currentColor" stroke="none"/></svg>
          <span class="location-text"><span class="loc-muted">Current Location:</span> <strong>Goyang-si, Ilsan-dong-gu</strong></span>
          <button type="button" class="icon-btn loc-refresh" aria-label="Refresh location">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-3-7"/><path d="M21 3v6h-6"/></svg>
          </button>
        </div>
      </div>

      <!-- Camera + detection -->
      <section class="camera-region">
        <div class="camera-bg" role="img" aria-label="Camera view of PET bottle"></div>

        <div class="bbox-wrap">
          <div class="bbox">
            <span class="bbox-corner tl"></span>
            <span class="bbox-corner tr"></span>
            <span class="bbox-corner bl"></span>
            <span class="bbox-corner br"></span>
          </div>
          <div class="bbox-anchor"></div>
          <div class="ai-chip glass-chip">
            <svg class="leaf" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 18c6-1 12-7 12-14a9 9 0 00-9 9c0 4-2 5-3 5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9 15c2-3 5-5 8-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span><strong>Plastic</strong> <span class="chip-sub">(98% Match)</span></span>
          </div>
        </div>
      </section>

      <!-- Bottom sheet -->
      <section class="bottom-sheet">
        <div class="sheet-handle" aria-hidden="true"></div>

        <div class="sheet-head">
          <div class="sheet-icon-circle" aria-hidden="true">
            <svg width="22" height="28" viewBox="0 0 24 30" fill="none" stroke="#2D5A27" stroke-width="1.6"><path d="M12 4v22"/><path d="M9 4h6"/><ellipse cx="12" cy="4" rx="4" ry="2"/><path d="M8 26h8"/></svg>
          </div>
          <div class="sheet-titles">
            <h1 class="sheet-title">Clear PET Bottle</h1>
            <p class="sheet-sub">Transparent beverage bottle</p>
          </div>
          <div class="badge-local">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M6 21V7l6-4 6 4v14"/><path d="M9 21v-8h6v8"/></svg>
            <span>Goyang-si Local Rule</span>
          </div>
        </div>

        <div class="how-section">
          <h2 class="how-heading">
            <svg class="leaf-sm" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 18c6-1 12-7 12-14a9 9 0 00-9 9c0 4-2 5-3 5z" stroke="currentColor" stroke-width="1.8"/></svg>
            How to Recycle
          </h2>

          <div class="steps-row">
            <article class="step-card">
              <div class="step-illus" aria-hidden="true">
                <svg viewBox="0 0 48 56" class="step-svg"><path d="M24 6 L28 48 H20 Z" fill="none" stroke="#2D5A27" stroke-width="1.5"/><ellipse cx="24" cy="6" rx="6" ry="3" fill="#e8f0e7"/><path d="M18 38 Q24 52 30 38" fill="none" stroke="#6eb8ff" stroke-width="2" stroke-linecap="round"/></svg>
              </div>
              <p class="step-label"><span class="step-num">1</span> Drain</p>
              <p class="step-desc">Empty all liquid from the bottle.</p>
            </article>
            <span class="step-chevron" aria-hidden="true">›</span>
            <article class="step-card">
              <div class="step-illus">
                <svg viewBox="0 0 48 56" class="step-svg"><rect x="18" y="10" width="12" height="38" rx="3" fill="none" stroke="#2D5A27" stroke-width="1.5"/><path d="M22 14 L28 20" stroke="#c4a574" stroke-width="2"/><path d="M26 18 L30 24" stroke="#aaa" stroke-width="1.5" stroke-dasharray="2 2"/></svg>
              </div>
              <p class="step-label"><span class="step-num">2</span> Remove Label</p>
              <p class="step-desc">Remove the label and stickers.</p>
            </article>
            <span class="step-chevron">›</span>
            <article class="step-card">
              <div class="step-illus">
                <svg viewBox="0 0 48 56" class="step-svg"><path d="M14 38 L22 22 L30 24 L34 40 Z" fill="none" stroke="#2D5A27" stroke-width="1.5"/><ellipse cx="24" cy="22" rx="5" ry="2.5" fill="#e8f0e7"/></svg>
              </div>
              <p class="step-label"><span class="step-num">3</span> Flatten</p>
              <p class="step-desc">Flatten the bottle to save space.</p>
            </article>
          </div>
        </div>

        <button type="button" class="local-rule-banner">
          <span class="lr-icon-wrap" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2D5A27" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18"/><path d="M8 3v4"/><path d="M16 3v4"/></svg>
          </span>
          <span class="lr-text"><strong>Goyang-si Local Rule:</strong> Place in the designated plastic recycling bag or container on collection day.</span>
          <span class="lr-go" aria-hidden="true">›</span>
        </button>
      </section>

      <!-- Bottom controls -->
      <nav class="dock" aria-label="Primary actions">
        <button type="button" class="dock-pill">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v6l4 2"/></svg>
          History
        </button>
        <button type="button" class="dock-fab" aria-label="Capture for analysis">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="4" y="6" width="16" height="12" rx="2"/><circle cx="12" cy="11" r="3"/></svg>
        </button>
        <button type="button" class="dock-pill">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 10h.01"/><path d="M15 10h.01"/><path d="M10 15a3 3 0 004 0"/></svg>
          Tips
        </button>
      </nav>

      <div class="home-bar" aria-hidden="true"></div>
    </main>
  </div>
</body>
</html>
